<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6F9FA"/>
      <stop offset="100%" stop-color="#FFF8FB"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7AE5E5"/>
      <stop offset="100%" stop-color="#5A6FFF"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB7D5"/>
      <stop offset="100%" stop-color="#FF5A8A"/>
    </linearGradient>
    <linearGradient id="bubble3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#5A6FFF"/>
    </linearGradient>
    <radialGradient id="shine1" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="shine2" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Big bubble (center-left) -->
  <circle cx="200" cy="220" r="110" fill="url(#bubble1)" opacity="0.9"/>
  <circle cx="200" cy="220" r="110" fill="url(#shine1)"/>
  <!-- Medium bubble (right) -->
  <circle cx="340" cy="180" r="75" fill="url(#bubble2)" opacity="0.9"/>
  <circle cx="340" cy="180" r="75" fill="url(#shine2)"/>
  <!-- Small bubble (bottom-right) -->
  <circle cx="330" cy="330" r="55" fill="url(#bubble3)" opacity="0.85"/>
  <circle cx="330" cy="330" r="55" fill="url(#shine2)"/>
  <!-- Tiny accent bubbles -->
  <circle cx="140" cy="370" r="28" fill="#FFB7D5" opacity="0.6"/>
  <circle cx="400" cy="290" r="18" fill="#7AE5E5" opacity="0.5"/>
  <circle cx="120" cy="140" r="15" fill="#A78BFA" opacity="0.4"/>
  <!-- Pop effect lines around big bubble -->
  <g stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <line x1="90" y1="110" x2="70" y2="90"/>
    <line x1="55" y1="180" x2="30" y2="175"/>
    <line x1="80" y1="300" x2="55" y2="320"/>
  </g>
  <!-- "뽁" text -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="72" font-weight="900" fill="#5A6FFF" opacity="0.85">뽁</text>
</svg>
