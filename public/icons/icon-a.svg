<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- A안: 그라디언트 배경 + 큰 버블 하나 + 터지는 이펙트 -->
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5A6FFF"/>
      <stop offset="100%" stop-color="#FFB7D5"/>
    </linearGradient>
    <radialGradient id="bubbleA" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="50%" stop-color="rgba(122,229,229,0.6)"/>
      <stop offset="100%" stop-color="rgba(90,111,255,0.3)"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bgA)"/>
  <!-- 메인 버블 -->
  <circle cx="256" cy="240" r="130" fill="url(#bubbleA)" opacity="0.95"/>
  <ellipse cx="220" cy="195" rx="40" ry="25" fill="white" opacity="0.5" transform="rotate(-20 220 195)"/>
  <!-- 터지는 이펙트 라인 -->
  <g stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9">
    <line x1="130" y1="120" x2="105" y2="95"/>
    <line x1="380" y1="120" x2="405" y2="95"/>
    <line x1="100" y1="260" x2="70" y2="260"/>
    <line x1="410" y1="260" x2="440" y2="260"/>
    <line x1="145" y1="370" x2="120" y2="395"/>
    <line x1="370" y1="370" x2="395" y2="395"/>
  </g>
  <!-- 작은 파편 동그라미 -->
  <circle cx="120" cy="150" r="12" fill="white" opacity="0.6"/>
  <circle cx="400" cy="160" r="8" fill="white" opacity="0.5"/>
  <circle cx="130" cy="340" r="10" fill="white" opacity="0.4"/>
  <circle cx="390" cy="330" r="14" fill="white" opacity="0.5"/>
  <!-- 뽁 텍스트 -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="80" font-weight="900" fill="white" opacity="0.95">뽁</text>
</svg>
