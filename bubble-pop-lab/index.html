<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#7AE5E5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="오늘뽁" />
    <meta name="description" content="오늘의 스트레스, 뽁뽁 터뜨려서 날려버리세요. 무한 뽁뽁이 피젯 게임." />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>오늘뽁 · Todapop</title>
  </head>
  <body data-theme="bubble">
    <main id="app">
      <canvas id="scene"></canvas>

      <header class="hud">
        <div class="hud__left">
          <div id="hudBrand" class="hud__brand">오늘뽁</div>
          <button id="btnStop" class="hud__stop" hidden>← 그만하기</button>
        </div>
        <div class="hud__counters">
          <div class="hud__counter">
            <span class="hud__counter-label">오늘</span>
            <span id="todayCount" class="hud__counter-value">0</span>
            <span class="hud__counter-unit">개</span>
          </div>
          <div class="hud__counter hud__counter--sub">
            <span id="monthLabel" class="hud__counter-label">5월</span>
            <span id="monthCount" class="hud__counter-value">0</span>
            <span class="hud__counter-unit">개</span>
          </div>
        </div>
      </header>

      <!-- 남은 개수 (하단) -->
      <div id="remainingHud" class="remaining-hud" hidden>
        <span>남은 </span><span id="remainingCount" class="remaining-hud__count">0</span><span>개</span>
      </div>

      <!-- 몰입 모드 타이머 (하단) -->
      <div id="immersionHud" class="immersion-hud" hidden>
        <div class="immersion-hud__time">
          <span id="immersionTimer" class="immersion-hud__timer">1:00</span>
          <span id="immersionBonus" class="immersion-hud__bonus" data-show="false">+5</span>
        </div>
      </div>

      <!-- 콤보 (시각 효과만) -->
      <div id="combo" class="combo" data-show="false">
        <span class="combo__x">×</span>
        <span id="comboValue" class="combo__value">2</span>
        <span class="combo__label">COMBO</span>
      </div>

      <!-- 칭찬/클리어 토스트 -->
      <div id="praiseToast" class="praise-toast" data-show="false">
        <span id="praiseText" class="praise-toast__text"></span>
      </div>
      <div id="clearToast" class="clear-toast" data-show="false">
        <span id="clearText" class="clear-toast__text"></span>
      </div>

      <!-- 월간 안내 배너 -->
      <div id="monthInfo" class="month-info" hidden>
        <span id="monthInfoText" class="month-info__text">이번 달 기록은 매달 1일에 새로 시작돼요</span>
      </div>

      <!-- 랜딩 히어로 -->
      <section class="hero" id="hero">
        <h1 class="hero__title">오늘뽁</h1>
        <p class="hero__subtitle">오늘의 스트레스, 뽁뽁 터뜨려서 날리기</p>

        <div class="hero__modes">
          <button id="btnMeditation" class="mode-card mode-card--meditation">
            <span class="mode-card__icon">∞</span>
            <span class="mode-card__name">명상 모드</span>
            <span class="mode-card__desc">끝없이, 편안하게</span>
          </button>
          <button id="btnImmersion" class="mode-card mode-card--immersion">
            <span class="mode-card__icon">☯</span>
            <span class="mode-card__name">몰입 모드</span>
            <span class="mode-card__desc">집중해서, 시원하게</span>
          </button>
          <button id="btnDaily" class="mode-card mode-card--daily">
            <span class="mode-card__icon">★</span>
            <span class="mode-card__name">오늘의 패턴</span>
            <span class="mode-card__desc" id="heroPatternName">하트</span>
          </button>
        </div>

        <footer class="hero__footer">
          <a href="/privacy.html">개인정보처리방침</a>
        </footer>
      </section>

      <!-- 결과 모달 -->
      <section class="result" id="result" hidden data-show="false">
        <div class="result__card">
          <h2 class="result__title" id="resultTitle">시원하게 비웠어요</h2>
          <div class="result__count"><span id="resultCount">0</span><span class="result__count-unit">개의 스트레스를 터뜨렸어요</span></div>
          <p class="result__praise" id="resultPraise">뽁뽁 터진 만큼, 스트레스도 터져 나갔어요.</p>
          <div class="result__summary" id="resultSummary"></div>
          <div class="result__actions">
            <button id="btnReplay" class="result__btn result__btn--primary">한 번 더</button>
            <button id="btnShare" class="result__btn">공유하기</button>
            <button id="btnOther" class="result__btn result__btn--ghost" data-med="몰입 모드 하러 가기" data-imm="명상 모드로 쉬기" data-day="명상 모드 해보기">몰입 모드 하러 가기</button>
            <button id="btnHome" class="result__btn result__btn--ghost">홈으로</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
